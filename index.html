<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1a73e8" />
<title>柏の葉スマートシティツアー ガイドＦＡＱ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --blue: #1a73e8;
    --red: #ea4335;
    --yellow: #fbbc04;
    --green: #34a853;
    --text: #202124;
    --text-sub: #5f6368;
    --shadow: 0 1px 3px rgba(60,64,67,.15), 0 4px 12px rgba(60,64,67,.08);
    --shadow-hover: 0 2px 6px rgba(60,64,67,.18), 0 8px 24px rgba(60,64,67,.14);
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Google Sans', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  body { overflow-x: hidden; }

  /* ---- Layout shell ---- */
  .app { min-height: 100dvh; display: flex; flex-direction: column; }
  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }
  .container {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding: 16px 20px 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* ---- Top bar ---- */
  .topbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid #e8eaed;
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .topbar .spacer { flex: 1; }
  .topbar h1 {
    margin: 0;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    user-select: none;
  }
  .iconbtn {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 0.95rem;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 24px;
    cursor: pointer;
    transition: background .15s;
  }
  .iconbtn:hover { background: #f1f3f4; }
  .iconbtn.danger { color: var(--red); }
  .iconbtn.primary { color: var(--blue); }

  /* ---- Login screen ---- */
  #login {
    position: relative;
    background: var(--bg);
  }
  #login::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url('assets/bg-pc.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 0;
  }
  @media (max-width: 700px) {
    #login::before {
      background-image: url('assets/bg-mobile.jpg');
    }
  }
  #login .container {
    position: relative;
    z-index: 1;
    justify-content: flex-end;
    align-items: center;
    text-align: center;
    gap: 18px;
    padding: 16px 20px 4vh;
    min-height: 100dvh;
  }
  /* Hidden hot-spot at top of login page to trigger admin (5s long press) */
  .brand-hotspot {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40vh;
    z-index: 2;
    cursor: default;
    -webkit-tap-highlight-color: transparent;
  }
  .login-card {
    background: rgba(255,255,255,0.94);
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,.25);
    padding: 22px 22px 20px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .login-card label {
    text-align: left;
    font-size: 0.85rem;
    color: var(--text-sub);
    font-weight: 500;
  }
  .login-card input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 1.05rem;
    border: 1.5px solid #dadce0;
    border-radius: 12px;
    background: #fff;
    color: var(--text);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .login-card input[type="password"]:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(26,115,232,.15);
  }
  .btn-primary {
    appearance: none;
    border: none;
    background: var(--blue);
    color: #fff;
    font-size: 1rem;
    font-weight: 500;
    padding: 13px 24px;
    border-radius: 24px;
    cursor: pointer;
    transition: background .15s, box-shadow .15s, transform .05s;
  }
  .btn-primary:hover { background: #1765cc; box-shadow: var(--shadow); }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:disabled { background: #c5c7ca; cursor: not-allowed; box-shadow: none; }
  .login-error {
    color: var(--red);
    font-size: .9rem;
    font-weight: 500;
    min-height: 1.4em;
  }
  .footer {
    text-align: center;
    color: var(--text-sub);
    font-size: .75rem;
    padding: 16px;
    user-select: none;
  }
  .login-footer {
    text-align: center;
    color: #ffffff;
    font-size: .8rem;
    font-weight: 600;
    padding: 12px 8px 6px;
    text-shadow: 0 1px 2px rgba(0,0,0,.45);
    user-select: none;
  }

  /* ---- Search screen ---- */
  .search-wrap {
    background: var(--surface);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 24px 20px;
    margin-top: 16px;
  }
  .search-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fff;
    border: 1.5px solid #dadce0;
    border-radius: 28px;
    padding: 4px 8px 4px 20px;
    transition: border-color .15s, box-shadow .15s;
  }
  .search-input-row:focus-within {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(26,115,232,.15);
  }
  .search-input-row input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 1.05rem;
    padding: 12px 0;
    background: transparent;
    color: var(--text);
    min-width: 0;
  }
  .micbtn {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--text-sub);
    font-size: 1.3rem;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background .15s, color .15s;
  }
  .micbtn:hover { background: #f1f3f4; }
  .micbtn.listening {
    background: var(--red);
    color: #fff;
    animation: pulse 1.2s infinite;
  }
  .micbtn.unsupported { opacity: .35; cursor: not-allowed; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(234,67,53,.55); }
    50%     { box-shadow: 0 0 0 12px rgba(234,67,53,0); }
  }
  .search-btn-row { display: flex; justify-content: center; margin-top: 18px; }
  .search-btn-row button {
    min-width: 200px;
  }
  .hint {
    margin-top: 18px;
    color: var(--text-sub);
    font-size: .85rem;
    text-align: center;
  }
  .hint b { color: var(--text); font-weight: 500; }

  /* ---- Results screen ---- */
  .results-header {
    background: var(--surface);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 16px 20px;
    margin-top: 8px;
  }
  .results-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .results-meta .label { font-size: .8rem; color: var(--text-sub); font-weight: 500; }
  .results-meta .kw { font-size: 1rem; font-weight: 700; color: var(--text); word-break: break-all; }
  .results-count { font-size: .8rem; color: var(--text-sub); margin-top: 6px; }

  .card-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 16px;
  }
  .card {
    background: var(--surface);
    border-radius: 16px;
    box-shadow: var(--shadow);
    border-left: 6px solid #ccc;
    overflow: hidden;
    transition: box-shadow .15s, transform .05s;
  }
  .card:hover { box-shadow: var(--shadow-hover); }
  .card.color-0 { border-left-color: var(--blue); }
  .card.color-1 { border-left-color: var(--red); }
  .card.color-2 { border-left-color: var(--yellow); }
  .card.color-3 { border-left-color: var(--green); }
  .card-head {
    cursor: pointer;
    padding: 16px 18px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    user-select: none;
  }
  .card-head:active { background: #f8f9fa; }
  .card-title {
    flex: 1;
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
  }
  .card-cat {
    font-size: .7rem;
    color: var(--text-sub);
    margin-top: 4px;
    font-weight: 500;
  }
  .toggle-icon {
    width: 24px;
    height: 24px;
    flex: 0 0 24px;
    border-radius: 50%;
    background: #f1f3f4;
    color: var(--text-sub);
    font-size: .9rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform .2s, background .15s, color .15s;
  }
  .card.open .toggle-icon { transform: rotate(180deg); background: var(--blue); color: #fff; }
  .card-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height .3s ease;
  }
  .card.open .card-body { max-height: 2000px; }
  .card-body-inner {
    padding: 4px 22px 20px 22px;
    border-top: 1px solid #f1f3f4;
    margin-top: 0;
  }
  .answer {
    font-size: 14pt;
    font-weight: 700;
    line-height: 1.8;
    color: var(--text);
    margin: 14px 0 0 0;
    word-break: break-word;
  }
  .answer .bullet { color: var(--blue); margin-right: .35em; font-weight: 900; }

  .more-row {
    display: flex;
    justify-content: center;
    margin-top: 18px;
  }
  .btn-secondary {
    appearance: none;
    border: 1.5px solid var(--blue);
    background: #fff;
    color: var(--blue);
    font-size: .95rem;
    font-weight: 500;
    padding: 11px 22px;
    border-radius: 24px;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .btn-secondary:hover { background: var(--blue); color: #fff; }
  .btn-secondary:disabled { border-color: #dadce0; color: #9aa0a6; cursor: not-allowed; background: #fff; }

  .empty {
    background: var(--surface);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 32px 20px;
    text-align: center;
    margin-top: 16px;
    color: var(--text-sub);
  }
  .empty .big { font-size: 1.1rem; color: var(--text); font-weight: 500; margin-bottom: 6px; }

  /* ---- Modal (dialog) ---- */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(32,33,36,.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 16px;
  }
  .modal-backdrop.active { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 10px 40px rgba(0,0,0,.25);
  }
  .modal h2 { margin: 0 0 12px 0; font-size: 1.1rem; }
  .modal p { color: var(--text-sub); margin: 0 0 16px 0; font-size: .95rem; }
  .modal input[type="password"], .modal input[type="text"] {
    width: 100%;
    padding: 11px 14px;
    font-size: 1rem;
    border: 1.5px solid #dadce0;
    border-radius: 10px;
    outline: none;
    margin-bottom: 10px;
  }
  .modal input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,115,232,.15); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
  .modal-msg { font-size: .85rem; color: var(--red); min-height: 1.2em; margin-bottom: 8px; }

  /* ---- Responsive ---- */
  @media (max-width: 600px) {
    .brand-title { font-size: 1.55rem; }
    .container { padding: 12px 14px 20px; }
    .topbar h1 { font-size: .95rem; }
    .search-wrap { padding: 18px 14px; }
    .search-input-row input { font-size: 1rem; padding: 11px 0; }
    .answer { font-size: 12pt; line-height: 1.75; }
    .iconbtn { padding: 8px 10px; font-size: .85rem; }
  }
  @media (max-width: 380px) {
    .brand-title { font-size: 1.35rem; }
    .answer { font-size: 11.5pt; }
  }

  /* Hide native search cancel */
  input::-webkit-search-cancel-button { display: none; }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ===== Login screen ===== -->
  <section id="login" class="screen active" aria-label="ログイン画面">
    <div class="brand-hotspot" id="brandTitle" aria-hidden="true"></div>
    <div class="container">
      <form class="login-card" id="loginForm" autocomplete="off">
        <label for="pwInput">パスワード</label>
        <input id="pwInput" type="password" inputmode="numeric" autocomplete="off" required />
        <div class="login-error" id="loginError"></div>
        <button type="submit" class="btn-primary" id="loginBtn">ログイン</button>
      </form>
      <div class="login-footer">Rev20 コンテンツベース</div>
    </div>
  </section>

  <!-- ===== Search screen ===== -->
  <section id="search" class="screen" aria-label="キーワード入力画面">
    <div class="topbar">
      <button class="iconbtn danger" id="exitBtn1" title="アプリを終了">✕ 終了</button>
      <div class="spacer"></div>
      <h1>ガイドＦＡＱ 検索</h1>
      <div class="spacer"></div>
      <button class="iconbtn" id="menuBtn" title="管理メニュー">⋮</button>
    </div>
    <div class="container">
      <div class="search-wrap">
        <form id="searchForm" autocomplete="off">
          <div class="search-input-row">
            <input id="kwInput" type="text" placeholder="キーワードを入力（例：AIカメラ）" autocomplete="off" enterkeyhint="search" />
            <button type="button" class="micbtn" id="micBtn" title="音声入力">🎤</button>
          </div>
          <div class="search-btn-row">
            <button type="submit" class="btn-primary">🔍 検索</button>
          </div>
        </form>
        <p class="hint">
          入力例：<b>AIカメラ</b> / <b>実証実験</b> / <b>街区</b> / <b>UDCK</b> / <b>自動運転</b>
        </p>
      </div>
      <div class="footer">
        キーボード入力 または マイク🎤での音声入力（日本語）に対応<br />
        Enterキー または「🔍 検索」ボタンで実行
      </div>
    </div>
  </section>

  <!-- ===== Results screen ===== -->
  <section id="results" class="screen" aria-label="検索結果画面">
    <div class="topbar">
      <button class="iconbtn danger" id="exitBtn2" title="アプリを終了">✕ 終了</button>
      <div class="spacer"></div>
      <h1>検索結果</h1>
      <div class="spacer"></div>
      <button class="iconbtn primary" id="backBtn" title="検索画面に戻る">← 戻る</button>
    </div>
    <div class="container" id="resultsContainer">
      <div class="results-header">
        <div class="results-meta">
          <div class="label">検索キーワード</div>
          <div class="kw" id="resKw"></div>
        </div>
        <div class="results-count" id="resCount"></div>
      </div>
      <div class="card-list" id="cardList"></div>
      <div class="more-row" id="moreRow" style="display:none">
        <button class="btn-secondary" id="moreBtn">他の質問を見る ↓</button>
      </div>
    </div>
  </section>

  <!-- ===== Modals ===== -->
  <div class="modal-backdrop" id="exitModal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="exitTitle">
      <h2 id="exitTitle">アプリを終了しますか？</h2>
      <p>このタブを閉じてキーワード検索を終了します。</p>
      <div class="modal-actions">
        <button class="iconbtn" data-modal-close>キャンセル</button>
        <button class="btn-primary" id="exitConfirmBtn" style="background:var(--red)">終了する</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="adminModal">
    <div class="modal" role="dialog" aria-modal="true">
      <h2>管理者メニュー</h2>
      <p>パスワードを変更します。現パスワードと新パスワードを入力してください。</p>
      <input type="password" id="curPw" placeholder="現パスワード" autocomplete="off" />
      <input type="password" id="newPw" placeholder="新パスワード" autocomplete="off" />
      <input type="password" id="confPw" placeholder="新パスワード（確認）" autocomplete="off" />
      <div class="modal-msg" id="adminMsg"></div>
      <div class="modal-actions">
        <button class="iconbtn" data-modal-close>キャンセル</button>
        <button class="btn-primary" id="changePwBtn">変更する</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   柏の葉スマートシティツアー ガイドＦＡＱ
   ============================================================ */
(function () {
  'use strict';

  /* ---- FAQ DB (embedded; rebuilt from Excel) ---- */
  const FAQ_DB = [{"answers":["● 開発面積は約273万㎡（東京ドーム約63個分）と、日本最大級の規模です。（又は、東京ディズニーランド 約５個分です。）","● 2026年度初頭で概ね駅前エリアの開発は完了し、今後は東京大学や国立がん研究センター東病院など「イノベーションキャンパスエリア」を中心に、オフィスや研究棟の開発を進めており、既に「三井ガーデンホテル柏の葉パークサイド」や「三井リンクラボ」などが稼働しています。"],"tags":["柏の葉スマートシティ概要"],"id":1,"question":"街の規模はどれくらいですか？","keywords":["規模","柏の葉スマートシティ概要"]},{"answers":["● 現在の人口は約13,000人。計画人口は2030年26,000人を目標としています。"],"tags":["柏の葉スマートシティ概要"],"id":2,"question":"柏の葉の現在の人口はどのくらいですか？","keywords":["現在","人口","柏の葉スマートシティ概要"]},{"answers":["● 現在、就労人口は約２０，０００人前後です。2026年４月にSMC新技術センター(従業員数1,400名)が加わりました。"],"tags":["柏の葉スマートシティ概要"],"id":3,"question":"柏の葉キャンパス内での就労人数は？","keywords":["キャンパス","就労人数","柏の葉スマートシティ概要"]},{"answers":["● 事業会社としては「これまでの不動産業」から「アセットビジネスへの転換」すなわち「価値が上がり続ける街づくり」の実績やノウハウを構築することにあります。","● 既に部分的に進んでいます鵜が、端的にはこれらのノウハウを他の街区や海外とのパートナーシップを通して収益化する、つまり三井不動産が街づくりのパートナーとして選んでいただけることを目標にしています。","● そのための指標が「柏の葉国際キャンパスタウン構想」であり、目指すべき姿として「ミクストユースの街づくり」という設計思想を持っています。"],"tags":["柏の葉スマートシティ概要"],"id":4,"question":"柏の葉スマートシティの目的は？","keywords":["スマートシティ","目的","柏の葉スマートシティ概要"]},{"answers":["● 主には「時間的にも都心に近いアクセスにありながら緑豊かで閑静な環境面」、「子育て支援への共感や期待」、「資産価値」、「まちづくりコンセプトへの共感」といったお話を伺っています。","● 特にこの街では「街づくりへの参加アクセス」が随所に展開されていますので、ご自身のキャリアをまちづくりに活かしたい層などの転入も多数見受けられます。"],"tags":["柏の葉スマートシティ概要"],"id":5,"question":"住民の方々は何を求めて柏の葉に引っ越される方が多いですか？","keywords":["住民","柏の葉スマートシティ概要"]},{"answers":["● ひとつめは「資産価値」の部分です。この街は初めてのマンションが建築された2006年度以来、2011年の一時期を除いて販売価値は上がり続けています。具体例で申し上げると、1番街（06年竣工）は購入時よりおおよそ3割～4割程度の価格向上が確認されています。","● また、前述したような環境面に加え、子育て空間内に車が進入しにくい、日中時間帯の往来が常にあること、自治会の活性化などによる安全面などもご評価いただいています。"],"tags":["柏の葉スマートシティ概要"],"id":6,"question":"マンション購入の決めてになるのはどのような理由が多いですか？","keywords":["マンション","購入","理由","柏の葉スマートシティ概要"]},{"answers":["● 柏の葉では、歩行者空間の連続性を重視して街を設計しています。駐車場入口を極力集約化して、歩道の分断を最小限にするようにしてあります。","● また、十分な歩道幅の確保や、スロープによる高低差処理、視覚障害者誘導ブロックの設置を行い、多様性への配慮も設計に盛り込んでいます。","● 更に、 「歩きたくなる都市空間（Walkability）」を目指し、「学園の道」「緑園の道」など多様な歩行導線を用意しています。"],"tags":["柏の葉スマートシティ概要"],"id":7,"question":"柏の葉の開発において、ユニバーサルデザインの原則はどのように統合されていますか？","keywords":["ユニバーサルデザイン","開発","原則","統合","柏の葉スマートシティ概要"]},{"answers":["● 前提として、また公有地と三井家が所有していて大きく長期的なグランドデザインが描ける稀有な環境だったことも大きく、また、この街のポテンシャルとして国内トッププレイヤーの大学や研究機関があったのが最初でありそれを活かすグランドデザインとなった。グランドデザインは最初に決めたものをこれまで時代にあわせて改善して進めており、近年では２年単位ごとに見直しし、常に方向修正をしている。"],"tags":["柏の葉スマートシティ概要"],"id":8,"question":"ファーストとセカンドステージと進められていて素晴らしいが、最初からグランドデザインがあったのか？たまたま学や土地があったからなのか？","keywords":["ファースト","セカンドステージ","グランドデザイン","素晴","最初","土地","柏の葉スマートシティ概要"]},{"answers":["● 当初は３０年で描いており、２０３０年をゴールとしていたが、最近になって１０年延長して４０年と言っている。開発スタートの前から構想検討は進めており１９９０年代後半から数えると５０年とも言える。５０年で三井不動産がたとえ抜けたとしても成長していく街にしていくのが理想で、そのためにも費用面でも自立が必要。"],"tags":["柏の葉スマートシティ概要"],"id":9,"question":"５０年単位での街づくりの話があったがなぜ５０年で考えたのか？","keywords":["年単位","柏の葉スマートシティ概要"]},{"answers":["● まずは三井の土地である4街区を第一ステージとして開発を進めました。","● 子育て世代を中心に計画通りに増加しています。","● これからは昼間の人口を増やすのもひとつの目標です。"],"tags":["歴史"],"id":10,"question":"駅前開発エリアはどのような考えで進めたのですか？","keywords":["エリア","駅前開発","歴史"]},{"answers":["● 辻仲病院柏の葉は誘致ではなく、病院側が自主的に開設しました。病床拡大を考えていた辻仲病院グループが、つくばエクスプレスの開業に伴う柏の葉キャンパス周辺の開発計画を知り、2008年に新病院の建設を開始し、2009年6月1日に開院しました。"],"tags":["歴史"],"id":11,"question":"辻中病院は誘致したのか？","keywords":["辻中病院","誘致","歴史"]},{"answers":["● まさに公民学連携や柏の葉の街づくりを象徴する物件の一つといえるのがこの「かけだし横丁」になります。","● 始まりは「公民学連携とかいうのはいいが、アフターで交流する場が無い」「住民同士の場もない」という、住民とコンタクトを取りたい大学側や住民同士から上がった意見になります。","● その後、UDCKのセンター長を務めている出口先生を中心とした都市設計の専門家による検証の上、「ひとまず置いてみよう」ということで屋台を実際に仮設するPJが実施されました。"],"tags":["歴史"],"id":12,"question":"駆け出し横丁の成り立ちは？","keywords":["横丁","歴史"]},{"answers":["● 千葉県の土地区画整理事業として2030年をひとつの目安にしておりますが、スマートシティーとしては今後も開発を進める予定です。","● 具体的に、役員会を経て2040年まで延長することが決定しております。"],"tags":["これからの街づくり"],"id":13,"question":"2030年をめどに開発を進めているとの事ですがそれ以降は？","keywords":["開発","以降","2030","これからの街づくり"]},{"answers":["● 近くに工場や倉庫などはありますが、イノベーション地区ではオフィスや研究ラボなどを予定しています。","● 2026年４月には、空気圧分野で国際最大手のSMCが新技術センターを3棟開業します。","● 加えて、三井不動産が直接手掛ける物件としては「三井リンクラボ」があり、駅前エリアから少し離れたイノベーションキャンパスエリアに展開しており、現在2棟目の建築が進んでいます。"],"tags":["これからの街づくり"],"id":14,"question":"工場とかは作らないのですか？","keywords":["工場","これからの街づくり"]},{"answers":["● 過去にはあったが実現しなかった。他国のトロントやエストニアの事例を観察していても定着までには至っておらず、逆に住民を取りこぼす（特に高齢者）可能性がありこの街では実装していない。恐らく今後も実装はされないだろう。"],"tags":["これからの街づくり"],"id":15,"question":"地域通貨の構想等はあるか？","keywords":["地域通貨","構想等","これからの街づくり"]},{"answers":["● 内部での議論はしているが、生成AIも手段でしかないのでそれで街に何ができるのかがまだはっきりとした答えを見いだせていない。"],"tags":["これからの街づくり"],"id":16,"question":"AIが進展していったときのスマートシティのあり方は議論されているか？","keywords":["スマートシティ","進展","議論","AI","これからの街づくり"]},{"answers":["● 柏の葉街づくり推進部は、約40人体制で不動産開発、ライフサイエンス集積、データプラットフォーム活用、エリアマネジメントの4つの機能を担当しています。","● 土地開発だけでなく、公民学連携の促進、企業誘致、住民協働、共創事業の推進まで、街全体の価値向上を統括しています。","● 柏の葉エリアでは「三井不動産がマスターディベロッパーとして主体的に動きながらも、実働部隊として三井不動産ビルマネジメント活動します。"],"tags":["街の運営"],"id":17,"question":"三井不動産柏の葉街づくり推進部は街づくりにおいてどこまで統括しているのか？","keywords":["三井不動産柏","葉街","推進部","統括","街の運営"]},{"answers":["● 大半は「UDCKタウンマネジメント」からの拠出になっております。実態は三井不動産ですが、自走を目指してTMの収益源開発を進めています。"],"tags":["街の運営"],"id":18,"question":"街の運営に関わる予算はどこから出ていますか？","keywords":["運営","予算","街の運営"]},{"answers":["● 公道の高質化などのインフラについては、整備を三井不動産が主体で行い、管理運営や修繕に係る費用は柏市も一定額を負担しています。","● 将来的には責任部署による自走化を目指しております。"],"tags":["街の運営"],"id":19,"question":"公共施設に関わる予算はどこから出ていますか？","keywords":["公共施設","予算","街の運営"]},{"answers":["● まず前提として、三井不動産は従来の不動産事業だけでなく「街づくりの主体事業者」というノウハウを持った事業体としての発展を目指しています。そのために、ここ柏の葉で「街をフィールド化した実証実験エリアの運営」というノウハウの蓄積に取り組んでいます。","● これらの取り組みをまるごと、あるいはプロジェクト単位で域外へ輸出することで「街の価値を挙げられる事業体」としてのポジションを確保したいと考えています。"],"tags":["街の運営"],"id":20,"question":"なぜ三井不動産は柏の葉で「スマートシティ開発」に取り組んでいるのでしょうか？","keywords":["スマートシティ","三井不動産","開発","街の運営"]},{"answers":["● 直接的な補助はありませんが、以下の点で伴走を頂いています。UDCKディレクターとしての人員補充、UDCKを中心としたコンソーシアムの構築や運営。KOIL TERRACE入居テナントへの家賃補助制度（スタートアップ支援システムの一環）"],"tags":["街の運営"],"id":21,"question":"スマートシティ運営の費用について柏市からの補助はあるのでしょうか？","keywords":["スマートシティ","運営","費用","柏市","補助","街の運営"]},{"answers":["● ①国際キャンパスタウン構想でそれぞれの分野について「重点目標」「目標」に分けて設定しています。","● ②定期的にフォローアップ調査を行い、達成率を数字化しています（内部情報として）。","● ポジティブ面→生活の利便性（≒ミクストユースな街づくり）や開発されていく未来の街へ、街並みへの期待値が高い"],"tags":["街の運営"],"id":22,"question":"柏の葉ではどのようなKPIを設定していますか？","keywords":["設定","KPI","街の運営"]},{"answers":["● ３０代から４０代が多い傾向です。"],"tags":["街のデータ"],"id":23,"question":"世代構成は？","keywords":["世代構成","街のデータ"]},{"answers":["● ︎柏の葉キャンパス駅は、2025年度乗降者数2万人を超えました。21,333人（昨年度：19,821人）です。"],"tags":["街のデータ"],"id":24,"question":"TX つくばエクスプレスの１日の乗車人数は？","keywords":["エクスプレス","乗車人数","TX","街のデータ"]},{"answers":["● ２０２４年度末 柏北部中央地区としてのデータですが、進捗率７９．３％です。https://www.city.kashiwa.lg.jp/hokubuseibi/shiseijoho/keikaku/machizukuri/hokubu/shinchoku.html"],"tags":["街のデータ"],"id":25,"question":"区画整理の進捗は？","keywords":["区画整理","進捗","街のデータ"]},{"answers":["● ＵＤＣＫは「柏の葉国際キャンパスタウン構想」に基づく街づくりを進めるための諮問機関。実際には、三井不動産などの事業者が素案をまとめ、実行に移す前の計画段階で摺合せを行う。例えばこういうことを街に実装したいと提案を受けた際、バス車両の形態について見分けがつくようにデザインを工夫するように意見をしたり、住民への説明会を開催したりしている。"],"tags":["街の運営"],"id":26,"question":"UDCK は、街としてどこまで関与しているか？ 自動運転の場合、街として承認するのか？","keywords":["関与","自動運転","場合","承認","UDCK","街の運営"]},{"answers":["● やはり手続きやスピード感の違いは大きい。大学などは何かやろうとしても２，３ヶ月先の学内会議まで議題に上がらないことも多く、作成資料も多い。"],"tags":["街の運営"],"id":27,"question":"公民学 目線が民間企業と違う苦労などがあれば教えてほしい。","keywords":["公民学","目線","民間企業","苦労","街の運営"]},{"answers":["● 当社は「従来の不動産会社からの脱却」を目指し「長期的に街の価値を向上できるノウハウごと不動産事業が出来る会社」として変革を進めている。不動産業は建物を作り、売るだけではそのうちに衰退するという考えを持っており、街づくりや街運営のノウハウをこの街で習得し、それを今後の他の街づくりへパッケージごと乗り込む、あるいは実例としてのサービスを提供するマネジメントビジネスを行うことで、長期目線での投資回収を考えている。柏の葉単体でいうと、100年経っても回収できない費用を投下しているといってもいいが、その価値はあるというのが経営的な判断。"],"tags":["街の運営"],"id":28,"question":"三井不動産としてはどこで儲ける視点なのか？","keywords":["三井不動産","視点","街の運営"]},{"answers":["● １番街は、総戸数９７７戸に対して９９０台","● ２番街は、８８０戸に対し機械５３６台、自走２０４台、平置き１９台です。"],"tags":["モビリティ"],"id":29,"question":"近隣マンションの駐車場台数は？","keywords":["マンション","近隣","駐車場台数","モビリティ"]},{"answers":["● 街のアップデートや開発が進んでおり、居住環境面においては概ねご評価を頂いています。","● 一方、施設面では飲食店、ビジネス環境支援、地域コミュニティなどは改善要望が出やすい領域です。","● 今後の街づくりの観点からは「参加型」「傍観型」「消費者型」に完全な分断が起きており、「住民自らが進める街づくり」にはまだまだ課題が多いのが実情です。主たる要因としては、ミクストユースに必要な「高度人材の就労機会が限られていること」が挙げられます。やはり、働き、住む場所にならないと自分事にはなりにくいようです。"],"tags":["住民の声"],"id":30,"question":"住民の評価や不満は、どんな傾向がありますか？","keywords":["住民","評価","不満","傾向","住民の声"]},{"answers":["● ２０１６年の調査ですが、１位買い物に便利、２位、緑豊かで環境が良い、３位通勤・通学に便利となっています。https://www.kashiwanoha-smartcity.com/fdownload.php?ctr=download\u0026d=3※P.７ 右側"],"tags":["住民の声"],"id":31,"question":"住民によるまちの評価は？","keywords":["住民","評価","住民の声"]},{"answers":["● 第一印象と第二印象で申し上げると、最初にこの街に降り立った時に感じた「なんかいい街、大学のキャンパスみたい」と感じた。ツアーにお越しになる方も同様の印象を持つ方が多い。最初は理由がわからなかったが、徐々にそれが「街の空間デザイン」をUDCKで描き、公民学が連携しているおかげだと知った。第二印象としてはソフト面・コミュニティ面で、この街では「セレンディピティ」が溢れている。何気ない会話からアイデアが生まれ、実装されていく街というのを体感していて稀有な街だと実感している。"],"tags":["住民の声"],"id":32,"question":"住民目線でこの街をどんなふうに評価されてる？","keywords":["住民目線","評価","住民の声"]},{"answers":["● UDCKが長期間にわたって稼働しており、公民学連携型の街づくりが「経年優化」し続けていることがあげられます。","● 加えて、周辺の土地環境の権利が事前に整備されており（三井か公共の土地ばかり）、長期的な目線で開発が出来ることは極めて特徴的です。","● これらの要素がかみ合った結果、短期的な事業スキームや政治的なものに振り回されず、長期目線でのアセットマネジメントが成立している点も特徴的と言えます。"],"tags":["他のスマートシティとの比較"],"id":33,"question":"他のスマートシティーと比較して優っているところは？","keywords":["スマートシティー","比較","他のスマートシティとの比較"]},{"answers":["● 特に連携はございませんが、様々な国や地域のスマートシティ関係者がご見学にいらしています。"],"tags":["他のスマートシティとの比較"],"id":34,"question":"他のスマートシティーと何か連携しているか？","keywords":["スマートシティー","連携","他のスマートシティとの比較"]},{"answers":["● 構成団体は、柏市、柏商工会議所、田中地域ふるさと協議会、柏の葉地域ふるさと協議会、三井不動産、首都圏新都市鉄道（TX）、東京大学、千葉大学の８つです。","● 公民学にとってそれぞれの狙いや目標、メリットデメリットのバランスメーカーとしてUDCKが中心を担っている点が特徴的です。（利害関係の調整）","● 具体例でいうと、自動運転バスは大学にとっては技術の実験の場として柏の葉を使える、柏市にとっては将来的な周回バスの課題解決を目指すことが出来る（前例ができる）、市民にとっては住環境の向上に繋がる可能性を見出せる、といった、それぞれにとっての「メリット」を調整する機関として運用されています。"],"tags":["公民学連携"],"id":35,"question":"公民学連携の体制について教えてください。","keywords":["公民学連携","体制"]},{"answers":["● この街は、「新しい取り組みに理解のある」層が多いため、それゆえに丁寧な説明を心がけています。","● 体制としては、事前の説明会開催や問い合わせの窓口としてUDCKがコミュニケーションのハブとなり、説明会の開催や問い合わせ対応、アフターケアなどを行っています。","● 事例としては、AIカメラや自動運転バスの実験実験開始の際は、民間企業（三井不動産）からの発信ではなく、公民学のUDCKが介在することにより、個人情報の不正利用や、不正流用等の懸念が払しょくが出来ていると、住民の皆様からはご評価いただいています。"],"tags":["公民学連携"],"id":36,"question":"新しい取り組みを導入する際、住民の同意はどのように得ていますか？","keywords":["導入","住民","同意","公民学連携"]},{"answers":["● UDCKに行けば街に関する情報はいつでも得られるようになっており、UDCKでは定期的にサロンを開催し、意見を交換しています。","● 更に、オンラインでは駅前のサイネージ、LINEやFacebook等のSNS、ウェブサイト、ポスター、メールなど様々な手段を設けています。","● 課題としてはパッシブな住民に対して情報をシームレスに届ける仕組みであり、ゴールとしてはアプリの実装を目指しております。"],"tags":["公民学連携"],"id":37,"question":"街の人たちはどうやって情報をとるのですか？","keywords":["情報","公民学連携"]},{"answers":["● 日本初のUDCとして行政・大学・企業・住民が集まって議論し、合意形成や実装につなげるための「中立的な柏の葉の街づくりの中核拠点」として運営されています。","● 三井不動産、地元企業、東京大学や千葉大学、柏市などがそれぞれ人員やリソースを提供し、公民学連携の象徴ともなっています。","● 行政・大学・企業・住民が集まって議論し、合意形成や実装につなげるための中立的な拠点です。"],"tags":["公民学連携"],"id":38,"question":"UDCKは何をしている組織ですか？","keywords":["組織","UDCK","公民学連携"]},{"answers":["● UDCKを中心に、行政・大学・企業・住民が集まりやすい「場」があり、課題やアイデアを持ち寄って、実証→改善のサイクルを回しやすい体制になっています。","● 加えて、それぞれが課題解決のためのリソースを持ち寄ることによる「当事者意識」の醸成にも一役買っており、”まちの課題≒自分たちの課題”担っている点が文化として根付いています。","● UDCKではそれぞれがどのようなメリットを得られるのか、という点に注目した調整を日々行っています。自動運転バスを例にとると大学は、技術の提供。 柏市は、将来的なモビリティの課題解決の前例づくり。三井不動産は、実証実験フィールドとしての活用。市民は、生活環境向上の期待性。 といった点にそれぞれ注目されています。"],"tags":["公民学連携"],"id":39,"question":"なぜ“公・民・学連携”がうまく回っているのですか？","keywords":["学連携","公民学連携"]},{"answers":["● 街づくりの柱が「健康長寿」：公・民・学連携で、徒歩圏に公園やスポーツ施設が揃う職住遊学一体の環境づくりなど、日常の“自然に動ける”暮らしで健康を後押ししています。","● 参加型の拠点である「まちの健康研究所『あ・し・た』」は、ららぽーと柏の葉北館3Fに設置されており、「あるく・しゃべる・たべる」を合言葉に、体組成・握力などの測定（無料）や運動/栄養などの講座・イベントを通じて、健康づくりと社会参加を促進しています。","● 更に、データ×ウェルネスの仕組みとして、生活者が同意したパーソナルデータを安全に連携する「Dot to Dot」を基盤に「柏の葉データプラットフォーム」を構築し、ポータル「柏の葉スマートライフパス」でデータを活かした生活者向けサービス提供が始まっています。"],"tags":["健康長寿"],"id":40,"question":"健康増進のための取り組みについて教えてください。","keywords":["健康増進","健康長寿"]},{"answers":["● 三井不動産となります。","● 加えて、あ・し・たのインフラ（会員情報や施設でのブース、実証実験への参加権）を活用するヘルスケア系の企業からのテナント費用が原資になっています。"],"tags":["健康長寿"],"id":41,"question":"「あ・し・た」の運営費はどこが出しているのか？","keywords":["運営費","健康長寿"]},{"answers":["● 柏の葉の開発における障がい者のための環境整備は、法律や地方公共団体が定める条例や規則に則った一般的なものです。","● 具体的には、十分な歩道幅の確保やスロープによる高低差処理、視覚障害者誘導ブロックなどです。 柏の葉独自の特別な定義や、それに基づく施策は実施していません。"],"tags":["健康長寿"],"id":42,"question":"障碍者対策についてどのようなことを行われていますか？","keywords":["障碍者対策","健康長寿"]},{"answers":["● 病気を治す場所というより、健康の見える化や予防・運動・食のきっかけをつくる拠点です。体組成、ベジチェック等の測定、イベント、健康サービスの案内などを通じて、幅広い世代が立ち寄れる設計になっています。","● 「住むだけで健康になる街づくり」をテーマが「健康長寿」の具体的な目標となっており、この施設は「そうなりたい住民」と「それをサービスとして実装したい」企業や研究者との接点という役割を持っています。","● 会員は約3９00名おり、参画する企業からも高い評価を頂いています。"],"tags":["健康長寿"],"id":43,"question":"「あ・し・た」（まちの健康研究所）は何をする施設ですか？","keywords":["健康研究所","施設","健康長寿"]},{"answers":["● カゴメの「ベジチェック」は、皮膚のカロテノイド量を測定して野菜（特に緑黄色野菜）の量を推定します。野菜に含まれるカロテノイドは体内に吸収され2～4週間かけて皮膚に蓄積されます。これを光学的にLED光を照射して、皮膚からの反射光を測定します。","● 野菜ジュース200mlを1ヶ月間毎日飲むと、皮膚カロテノイド量が上昇することが研究で確認されています。"],"tags":["健康長寿"],"id":44,"question":"あ・し・たのカゴメブースの野菜摂取量測定はどうやって計測しているのですか？","keywords":["カゴメブース","野菜摂取量測定","計測","健康長寿"]},{"answers":["● 具体的にどのくらい寿命が延びたのかというようなデータはまだ無いが、中長期に蓄積することで他の街と比べてそのような分析もできるようになるのではないか"],"tags":["健康長寿"],"id":45,"question":"健康長寿のデータは具体的にとれてる？","keywords":["データ","健康長寿","具体的"]},{"answers":["● 米国のグリーンビルディング協会（USGBC）が運営する国際的な環境性能認証制度「LEED(リード)」です。","● 柏の葉では、街づくり部門「ND(Neighborhood Development：近隣開発)」の計画認証において、最高ランクの「プラチナ認証」を日本で初めて取得しております。","● このことは「環境共生が進んだ街づくり」といういわゆるお墨付きであり、不動産会社としてのリーシングにも活用されています。"],"tags":["環境共生"],"id":46,"question":"LEED-NDとは何ですか？","keywords":["LEED","ND","環境共生"]},{"answers":["● LEEDプラチナは、米国のUSGBCが運営する国際的な環境認証で、認証レベルの中で最高ランクです。柏の葉は“街づくり”部門の LEED-ND（計画認証） でプラチナを日本で初めて取得しています。","● 評価は、生態系への配慮、公共交通、歩きやすさ、地産地消、建物の省エネなどを点数化して総合的に見ます。","● これを取る意味は、柏の葉の取り組みを第三者が国際基準で確認した証明になるので、海外企業や投資家・金融機関にも説明しやすくなり、企業誘致やESGの文脈で“信頼性の高い街づくり”として評価されやすくなる点です。"],"tags":["環境共生"],"id":47,"question":"環境指標LEEDプラチナを取って何か評価につながったか？","keywords":["プラチナ","環境指標","評価","LEED","環境共生"]},{"answers":["● はい、調整池です。柏市が所有し、三井不動産が整備、UDCK等が関わりながら管理運営しています。","● 日々の管理運営に係る費用や実施中のリニューアルの費用は、主な開発主体である三井不動産が負担し、日常管理はUDCKTMを中心に、定期的な大掃除は住民にも参加してもらうなど、みんなで管理するアクアテラス、という体制をとっています。","● SMCはアクアテラスの緑豊かな景観に合うような建築デザインに協力いただき、オフィスと水辺空間の親和性を一緒に作っています。"],"tags":["環境共生"],"id":48,"question":"アクアテラスは、今も調整池ですか？","keywords":["アクアテラス","調整池","環境共生"]},{"answers":["● 環境指標面では、水辺の環境を公・民・学連携での先進的な街づくりを行い、LEED-ND（街づくりの国際環境認証）で最高ランクのプラチナを日本で初取得しました。従来型の調整池を高質化した「柏の葉アクアテラス」など、憩いの水辺と治水機能を両立する整備も行っています。","● その他、近隣の柏の葉公園、自然湧水のあるこんぶくろ池などへのアクセスしやすくなる「ウォーカブルな街づくり」を推進しています。","● 治水面では、柏の葉アクアテラス等、元々調整池であったものを憩える親水空間へリノベーションするなど、公民学連携と管理協定で一般開放維持管理を実現しています。"],"tags":["環境共生"],"id":49,"question":"環境共生（自然環境）に関する取り組みについて教えてください。","keywords":["環境共生","自然環境"]},{"answers":["● 他の街での類似施設と大きく異なる特徴がこの点です。いわゆる「オフィス提供」や「営業機会の提供」といったことにとどまらず、各分野の専門家が実装まで伴走する支援を行う、かなり手間のかかる支援を行っています。","● このプログラムへの参加については審査制となっており、重点テーマとして、脱炭素・エネルギー／防災／移動・交通／ライフサイエンス／ヘルスケア・健康／スポーツ・エンタメ等を掲げつつ、それ以外のテーマも応募可としています。","● 具体的な支援内容は下記の通りです。"],"tags":["新産業創造"],"id":50,"question":"KOIL STARTUP PROGRAMの支援はどのような内容ですか？","keywords":["支援","内容","KOIL","STARTUP","PROGRAM","新産業創造"]},{"answers":["● 柏の葉スマートシティの「COMMUNITY FACILITY（共創を支える施設/組織）」として位置付けられているスタートアップ支援組織です。","● KOILの設計段階からパートナーシップを組んでサポートをしており、いわゆるVC面での設計やスマートアップ支援の仕組み作りなどで伴走いただいています。","● 「KOIL STARTUP PROGRAM」は、三井不動産・柏市が共催、TEPが企画運営を担っています。"],"tags":["新産業創造"],"id":51,"question":"TEPとはどのような内容ですか？","keywords":["内容","TEP","新産業創造"]},{"answers":["● OPEN時からの経緯をお伝えすると、当初は三井不動産オーナー広告代理店運営、という形式をとっておりました。","● 時期は申し上げられないのですが現在は、子会社である「三井不動産ビルマネジメント運営」に変更となっております。","● 理由はいくつかありまして、代表的なものとしては「コワーキングスペース運営のノウハウをグループ内に蓄積したかったこと」と「当事者意識を持った運営としたい」になります。"],"tags":["KOIL"],"id":52,"question":"KOILはどこが運営しているのでしょうか？","keywords":["運営","KOIL"]},{"answers":["● 単なる場所貸しではなく、新規事業初期のシード期・アーリー期を支援するコミュニティマネージャーが居られ、起業の悩み相談から、様々な企業同士のつなぎ役など、ソフト・コミュニティ面での支援を行っています。"],"tags":["KOIL"],"id":53,"question":"他のコワーキングスペースろコイルパークの大きな特徴は何か？","keywords":["コワーキングスペース","コイルパーク","特徴","KOIL"]},{"answers":["● 土日祝日に限りドロップインが可能です。"],"tags":["KOIL"],"id":54,"question":"KOILは1日からでも利用できますか？","keywords":["利用","KOIL"]},{"answers":["● KOIL屋上・ららぽーと屋上に一面設置されています。"],"tags":["エネルギー"],"id":55,"question":"太陽光パネルはどこにあるのですか？","keywords":["パネル","太陽光","エネルギー"]},{"answers":["● 柏の葉AEMSを2014年から運用し、省エネとBCPの両面で、地域エネルギーを一元管理し、街区を越えた電力融通も実現しています。電力の安定化に向け、瞬停蓄電池や非常用発電機の活用、電力アグリゲーター等で、再エネ時代の安定供給も含めて検証しています。","● 創エネ面では、太陽光・風力・バイオマスなどを活用し、街を実証フィールドとして取り組みを進めています。","● 再生可能エネルギーでは、太陽光・風力・バイオマスなどの「創エネ」や、EV導入／充電器設置など“グリーン電力の使い方”も含めて、街全体をフィールドに脱炭素の実証の取り組みを進めています。"],"tags":["エネルギー"],"id":56,"question":"環境共生に関する取り組みについて教えてください。","keywords":["環境共生","エネルギー"]},{"answers":["● 通常の街のマンションと同じです。 当初コジェネレーションシステムなどは構築したものの、現在は稼働させていません。","● コジェネレーションシステムは「どうやってごみを集めるのか」「その費用負担の仕組みはどうするのか」の2点においてサステナビリティ面で難しい点があり、柏の葉スマートシティとしては継続が難しいという判断にはなっています。"],"tags":["エネルギー"],"id":57,"question":"ごみの収集などは（例えばみなとみらいの様な）独自の収集システムはあるのか？","keywords":["システム","収集","独自","エネルギー"]},{"answers":["● 過去10年そのような事例はません。"],"tags":["エネルギー"],"id":58,"question":"エネルギー融通を実際に行ったことはありますか？","keywords":["エネルギー","融通","実際"]},{"answers":["● 災害時に“止まらない街”を目指し再設計の経緯があります。","● 柏の葉では街区間の電力融通を前提にした設計（AEMS等）を整備し、「専用の送電ルート（自営線）＋法律上の枠組み（特定供給）＋混ざらない制御」を整えています。","● 自営の送電線（自営線）で建物同士をつないでいるため、異なる街区間でも“指定した建物への供給”として電力を融通できます。"],"tags":["エネルギー"],"id":59,"question":"街区をまたいだ電力融通は、なぜ可能なのですか？","keywords":["街区","電力融通","可能","エネルギー"]},{"answers":["● 街全体の電力の使い方や発電・蓄電状況を可視化し、建物間の電力融通も含めて最適化を図る仕組みです。災害時のレジリエンス（止まりにくさ）にもつながります。","● AEMSにより逓減化されている電力コストは年間で１000万程度です。"],"tags":["エネルギー"],"id":60,"question":"AEMS（エリアエネルギーマネジメントシステム）とは何ですか？","keywords":["エリアエネルギーマネジメントシステム","AEMS","エネルギー"]},{"answers":["● 前提となる性能設計が異なり、いずれも「安心」に繋がる仕組みとして併用をするためです。","● リチウムイオンは、瞬発力（短時間・高出力）」が特徴で、AEMSと連携して“街の電力運用”を支える（速い制御）という形で日常的な運用に向いています。","● NASは、「持久力（長時間・大容量）」が特徴です。主に平常時のピークカットと非常用電源を目的に、12,960kWh（7.2時間放電）の容量があり街区間の電力融通にも活用されています。"],"tags":["エネルギー"],"id":61,"question":"リチウムイオン蓄電池とＮＡＳ電池の違いは？ なぜ２種類必要か?","keywords":["リチウムイオン","蓄電池","電池","種類必要","NAS","エネルギー"]},{"answers":["● 電気自動車には使用されていません。 主に街の電力融通と平常時のピークカット、ピークシフトに使用しています。"],"tags":["エネルギー"],"id":62,"question":"太陽光パネルで作ったエネルギーは電気自動車にも使われているのか？","keywords":["パネル","エネルギー","太陽光","電気自動車"]},{"answers":["● これは三井不動産の負担で、住民には全く配賦していない。"],"tags":["エネルギー"],"id":63,"question":"ＡＥＭＳのコスト負担はどこが行っているのか？","keywords":["コスト","負担","AEMS","エネルギー"]},{"answers":["● その他、近隣の柏の葉公園、自然湧水のあるこんぶくろ池などへのアクセスしやすくなる「ウォーカブルな街づくり」を推進しています。","● モビリティ面では、駅近立地を活かし、公共交通の利用促進や自転車専用道路、シェアサイクル等、自動車に依存しない移動に取り組んでいます。"],"tags":["モビリティ"],"id":64,"question":"モビリティに関する取り組みについて教えてください。","keywords":["モビリティ"]},{"answers":["● V2Iは車両と信号機などインフラとの連携、V2Pは車両と歩行者との連携技術です。車両単体の検知に加えて情報連携を行い、より安全で確実な自動運転を目指します。"],"tags":["モビリティ"],"id":65,"question":"V2I／V2Pとは何ですか？","keywords":["モビリティ"]},{"answers":["● 柏の葉は「実証を受け入れる街」としての取り組み実績があり、柏市としてもITS推進の土壌があります。そのため関係者が集まりやすく、段階的に住民理解も得やすい環境があるためです。"],"tags":["モビリティ"],"id":66,"question":"なぜ柏の葉で自動運転の実証を行うことになったのですか？","keywords":["自動運転","実証","モビリティ"]},{"answers":["● 今回の運用では運転手が乗車します。","● ただし、レベル4の定義上は「運転者なし」で成立することが前提です（運転責任の主体がシステム側に移る）。"],"tags":["モビリティ"],"id":67,"question":"レベル4運行時に運転手は乗車していますか？","keywords":["レベル","運行時","運転手","乗車","モビリティ"]},{"answers":["● 2026年1月13日から2月末頃までを予定し、柏の葉キャンパス駅〜東京大学柏キャンパス間のルートのうち一部区間で、特定自動運行（レベル4）の営業運行を検証します。"],"tags":["モビリティ"],"id":68,"question":"柏の葉でのレベル4実証の概要は？","keywords":["レベル","実証","概要","モビリティ"]},{"answers":["● ルート上の数カ所で実施されていますが、レベル4区間では公園前交差点の1ヶ所が対象、という説明で統一します。"],"tags":["モビリティ"],"id":69,"question":"V2I／V2Pはどこで実施されていますか？","keywords":["実施","モビリティ"]},{"answers":["● 現時点の実証では「遠隔監視・遠隔操作は実施しない」という整理で案内します（今後の発展として検討余地はあります）。"],"tags":["モビリティ"],"id":70,"question":"遠隔監視・遠隔操作は実施しますか？","keywords":["遠隔監視","遠隔操作","実施","モビリティ"]},{"answers":["● レベル4区間では道路交通法上、運転の責任主体がシステム側に移る整理ですが、民事上の整理を含め、責任分担の枠組みは国レベルでも検討が続いている段階です。断定せず「整理が進んでいる段階」と説明します。"],"tags":["モビリティ"],"id":71,"question":"万一の事故発生時の責任分担はどうなっていますか？","keywords":["万一","事故発生時","責任分担","モビリティ"]},{"answers":["● 駐停車車両の回避や路面環境の改良が自動運転継続率向上に有効であること、住民理解を段階的に獲得する重要性、センサーや制御システムの継続アップデートが実用化に不可欠であることなどです。"],"tags":["モビリティ"],"id":72,"question":"5年間の実証実験から得られた主な知見は何ですか？","keywords":["年間","実証実験","知見","モビリティ"]},{"answers":["● 北部の開発と共に、様々検討されています。"],"tags":["モビリティ"],"id":73,"question":"もっとモビリティが充実していると思っていたが、今後はどうなのかか？","keywords":["モビリティ","充実","今後"]},{"answers":["● 2026年の実証運行で得られるデータや知見をもとに、レベル4自動運転の社会実装を目指します。運行区間の拡大や頻度増加は検討事項で、確定情報は公表ベースに限って案内します。"],"tags":["モビリティ"],"id":74,"question":"今後の展開予定は？","keywords":["今後","展開予定","モビリティ"]},{"answers":["● レベル2の営業運行実証開始以降、自動運転バスが第一当事者となる事故は発生していません。過去に停車中のバスへ追突されたケースはあります（相手車両側が原因）。"],"tags":["モビリティ"],"id":75,"question":"これまでに事故は発生していますか？","keywords":["事故","発生","モビリティ"]},{"answers":["● 柏の葉ではエリア内のバス交通システムの利便性向上に向け、自動運転技術の開発と実装を急いでいます。"],"tags":["モビリティ"],"id":76,"question":"マート技術の例を挙げていただけますか？","keywords":["マート","技術","モビリティ"]},{"answers":["● 電動キックボードの実証実験などはありますが、 現在実装しているモノは無い。様々な実証実験は行われています。"],"tags":["モビリティ"],"id":77,"question":"この街の中で実際に公共のモビリティーを使っている事例はありますか？","keywords":["モビリティー","実際","公共","事例","モビリティ"]},{"answers":["● 大変勉強になった","● KOILとKOIL TERRACEでターゲット分けていたり、デザインが違うことが面白い","● オフィス入居の業種制限はあるか"],"tags":["モビリティ"],"id":78,"question":"自動運転バスご乗車で11:45に終了 質疑応答の時間がなかったので、何かあればメールにて問い合わせをとお伝えしていますか？","keywords":["バス","メール","自動運転","乗車","終了","質疑応答","時間","モビリティ"]},{"answers":["● ツアー申込時に申込可能です。申込サイトの記載をご参照ください。"],"tags":["モビリティ"],"id":79,"question":"自動運転バスには乗れないのですか？","keywords":["バス","自動運転","モビリティ"]},{"answers":["● 首都圏の混在交通空間（一般車両・歩行者・自転車が混在する公道）で、中型バスでの特定自動運行（レベル4）を目指している点が特徴です。インフラ協調（V2X）も活用します。"],"tags":["モビリティ"],"id":80,"question":"柏の葉での実証実験の特徴は？","keywords":["実証実験","特徴","モビリティ"]},{"answers":["● 可能です。"],"tags":["都市OS"],"id":81,"question":"データ連携システムでは新規の加入も可能ですか？","keywords":["データ","システム","連携","新規","加入","可能","都市OS"]},{"answers":["● 登録数は2026年1月現在で約6000名。うち半分が柏の葉スマートシティでの登録、残りがKDPFの仕組みを柏の葉から導入した神戸市の登録。尚、Webブラウザアプリとなっており専用アプリ化されておらず、操作性等のUIも使い勝手に改善が必要であり、そこに手を加えることでアクティブユーザーを増やしたいと考えている。"],"tags":["都市OS"],"id":82,"question":"スマートライフパスの利用者はどのくらいか？","keywords":["スマートライフパス","利用者","都市OS"]},{"answers":["● 費用面については持ち出しの状態となっており単体事業としては赤字。住民からは費用を徴収しておらずUDCKTMで負担している。ただスマートシティPJ全体に言えることとして、柏の葉でのデータプラットフォーム事業自体を黒字化する目的はなく、この仕組みを国内外の自治体に導入してもらうなど、プラットフォームサービスとしての展開を目指している。将来的には収支トントンを目指したい。"],"tags":["都市OS"],"id":83,"question":"ＫＤＰＦ運用にはどんな課題があるか？","keywords":["運用","課題","KDPF","都市OS"]},{"answers":["● アプリの充実と、利便性の改善を検討している。また、神戸市に代表されるような域外へのサービス展開を進めている。"],"tags":["都市OS"],"id":84,"question":"今後の展開予定は？","keywords":["今後","展開予定","都市OS"]},{"answers":["● 生活拠点としてのマンションに加え、「ミクストユースな街づくり」を体現する構成を維持すするためのテナントリーシングを行っています。","● 具体的には、「社会の変化に対応した小児科として土日祝日も営業するキャップスクリニック」や「ライフスタイル提案型の保育園」という新しい取り組みをしている保育園チコルなど、柏の葉らしいチャレンジングな取り組みに共感したテナント入居が「ミクストユース」を支えています。"],"tags":["ゲートタワー"],"id":85,"question":"ゲートタワーにはどんな施設がありますか？","keywords":["ゲートタワー","施設"]},{"answers":["● 柏の葉スマートシティには、三井不動産が掲げる「経年優化」の思想が組み込まれています。長く住む人にはその人なりの価値創造があり一方で、定期的に人が入れ替わることは新たな交流や情報などが入ってくる機会でもあり、街の発展に欠かせない機能と考えています。"],"tags":["ゲートタワー"],"id":86,"question":"ゲートタワーの賃貸棟ですが、分譲にしなかったことでかえって人材流出の懸念は無いのでしょうか？","keywords":["ゲートタワー","賃貸棟","分譲","人材流出","懸念"]},{"answers":["● 一番大きい要因として高度な研究開発企業が集まっていおり、オープンイノベーション（共創）を起こしやすい街だからと伺っています。柏の葉スマートシティの公・民・学連携の土壌の中で、顧客や研究スタッフが集まる拠点として技術交流・共創を進め、新産業創造にもつなげたいという狙いがあると伺っております。"],"tags":["SMC"],"id":87,"question":"なぜSMCは柏の葉に引っ越してくるのですか？","keywords":["SMC"]},{"answers":["● いえ、この土地は市有地（公有地）であり、三井不動産は応札しておりません。","● ただ、リーシングは柏市に対する全面バックアップとして三井不動産が様々なリソースを投入しました。よって、不動産事業の直接収支は赤字物件という評価になります。","● 一方、柏の葉スマートシティとタッグを組むメリットが柏市にとって「誰にでも説明しやすい明確化」がなされたこと、三井不動産としてもフラグシップ拠点としてSMCが移転したことは間違いなく街の価値を向上させるビッグな事案であり、まさに「アセットビジネス」の成果の一つと考えています。"],"tags":["SMC"],"id":88,"question":"SMCが入居した土地は三井不動産が販売したのですか？","keywords":["入居","土地","三井不動産","販売","SMC"]},{"answers":["● Rugby School Japanは、英国の名門パブリックスクール「Rugby School」の日本校として、柏の葉スマートシティに2023年9月に開校した英国式ボーディングスクール（全寮制・通学併用型インターナショナルスクール）です。首都圏初の本格的な英国式ボーディングスクールとなります。","● 対象年齢は、11歳～18歳。学生数は780名を目標としています。（開校時は約140名、16ヶ国以上から入学）","● 英国のRugby Schoolは、1567年創立の由緒ある名門校でイギリス9大パブリックスクール「The Nine」の一つで有名です。映画ハリーポッターの撮影地としても有名なところです。"],"tags":["ラグビー校"],"id":89,"question":"ラグビースクールとはどんな学校なのか？","keywords":["ラグビースクール","学校","ラグビー校"]},{"answers":["● ラグビー校としてもアジアの最初の拠点として様々な場所を検討してきたが、この街のハード的な環境、コミュニティに魅力を感じこの場所に決定した。学びも学校だけではなく、この地域を活かした教育を充実していければと考えている。"],"tags":["ラグビー校"],"id":90,"question":"ラグビースクールジャパンの目的は？","keywords":["ラグビースクールジャパン","目的","ラグビー校"]},{"answers":["● 三井不動産が主体になって行っています。","● リーシングが少々特徴的で、入居してくれるのであればどこでもよい、ということはなく品質重視でお声がけしています。その結果、開業以来、コロナ禍を経ても入れ替えになったのは半分です。","● 入れ替えになった店舗も「店舗拡大で移転」というケースもあります。"],"tags":["かけだし横丁"],"id":91,"question":"かけだし横丁の店舗誘致は誰がしているのですか？","keywords":["横丁","店舗誘致","かけだし横丁"]},{"answers":["● 柏の葉の夕焼けをイメージしたオリジナルドリンクで、かけだし横丁・KOIL・柏市などが巻き込まれた“共創”の事例として紹介できます（ノンアルもあり）。"],"tags":["かけだし横丁"],"id":92,"question":"柏の葉発の名物「No.4」とは何ですか？","keywords":["葉発","名物","No","かけだし横丁"]},{"answers":["● ミクストユースの街づくりを本気で進めるためには、それらのインフラとなる実力が抜きんでているテナント店舗の充実が欠かせないと考えている。例）かけだし横丁では、特徴ある店舗を三井不動産の社員が自らお声がけして誘致している。コロナ禍を経ても19店舗中、半分は残っており、残り半分も多くは「増床」での移転。 例）KOILパークでは事前の面談を導入している。「コワーキング」の「co」、つまり一緒に共創する文化への共感が重要と考えており、ただのシェアスペースとしての登録はお断りしている（正確にはドロップイン利用のみ）"],"tags":["かけだし横丁"],"id":93,"question":"テナント等の選び方はどうやっているか？","keywords":["テナント","かけだし横丁"]},{"answers":["● 国外は不動産関係者や行政関係者のうち、スマートシティ開発や不動産開発の関係が多い。国内は多種多様に渡っているが、大学関係者やスマートシティ開発の関係者、学生などの参加も多い。"],"tags":["スマートシティツアー"],"id":94,"question":"視察はどんな業種がどれくらい来てる？","keywords":["視察","業種","スマートシティツアー"]},{"answers":["● 原則、紙パンフ等の所定資料でのご案内となり、スライドデータ等の配布は行っていません（案件・資料の取り扱い条件によります）。"],"tags":["資料"],"id":95,"question":"ツアー資料（スライド等）はもらえますか？","keywords":["ツアー","スライド","資料"]},{"answers":["● こちらから公開資料をダウンロードすることが出来ます。https://www.kashiwanoha-smartcity.com/download/"],"tags":["資料"],"id":96,"question":"ツアー資料（スライド等）はもらえますか？","keywords":["ツアー","スライド","資料"]},{"answers":["● ポートランドは、CO2排出の多い自動車依存を下げるため、移動手段として“まず徒歩、次に自転車、公共交通”で用事を済ませられる街づくりを目指しています。具体的には、公共交通の駅から“20分以内”で買い物などができるよう都市を設計する、という考え方を取り入れていて柏の葉の街づくりでも参考にしました。"],"tags":["ポートランド"],"id":97,"question":"ポートランドのどこを参考にしたのですか？","keywords":["ポートランド","参考"]},{"answers":["● ポートランドは『Portland’s Climate Action Plan』を策定していて、CO2排出量を1990年比で、2020年までに25％、2030年までに40％、2050年までに80％削減する目標を掲げています。そのため交通分野の低炭素化に強く注力しています。"],"tags":["ポートランド"],"id":98,"question":"ポートランドの気候変動対策の目標はどんなものですか？","keywords":["ポートランド","気候変動対策","目標"]},{"answers":["● 将来的に自動運転車やシェアードサービスを中心にした、新しいモビリティシステムの導入を目指すとされています。あわせて、必要な場合はEVなど低炭素な選択を推奨する、という方向性です。"],"tags":["ポートランド"],"id":99,"question":"ポートランドでのモビリティの取り組みを教えて下さい。","keywords":["ポートランド","モビリティ"]},{"answers":["● ポートランドは“1人で自動車に乗っている状況の割合”を重視し、2012年に61％だったものを2030年に20％へ下げる目標を掲げています。つまり、相乗り・シェア・公共交通などに移行する設計思想がKPIに表れています。"],"tags":["ポートランド"],"id":100,"question":"ポートランドが重視している指標（KPI）は何ですか？","keywords":["ポートランド","重視","指標","KPI"]},{"answers":["● 一番分かりやすいのは“コンパクトに集約して歩いて暮らせる”という発想です。ポートランドは車社会から転換し、徒歩圏で生活が回る街をつくってきました。柏の葉も、駅を中心に徒歩圏内に商業・オフィス・住居・公園が集まる、車がなくても暮らしやすい設計を目指しています。"],"tags":["ポートランド"],"id":101,"question":"柏の葉はポートランドから何を学んだのですか？","keywords":["ポートランド"]},{"answers":["● ポートランドでは、1階にカフェや店舗、上層にオフィスや住居という“ミックスドユース”が基本で、昼夜の人の流れが生まれ、街の賑わいやエネルギー利用の平準化にもつながります。柏の葉でも駅前の施設で、1階の商業と上層のオフィス・公共機能などを組み合わせる考え方を取り入れています。"],"tags":["ポートランド"],"id":102,"question":"ミクスドユースはなぜ重要なんですか？","keywords":["ミクスドユース","重要","ポートランド"]},{"answers":["● ポートランドの“歩きやすさをつくる”という考え方を参考に、柏の葉では建物同士を歩行者動線でつなぐなど、徒歩移動の快適性を上げる設計を取り入れています。"],"tags":["ポートランド"],"id":103,"question":"ポートランドに学んだ柏の葉のウォーカブルは、どこが工夫ですか？","keywords":["ポートランド","ウォーカブル","工夫"]},{"answers":["● ポートランドは『自分たちの街は自分たちでつくる』という住民の自分ごと化が強い、と整理できます。柏の葉でも住民参加型を重視していて、UDCKを軸に、大学・行政・企業・住民が一体となって街の未来を描く。ワークショップやイベントを通じて声を反映する、という形で取り入れています。"],"tags":["ポートランド"],"id":104,"question":"ポートランド的な“市民参加”は、柏の葉ではどう実装していますか？","keywords":["ポートランド","市民参加","実装"]},{"answers":["● 歩きやすい街にするためです。ポートランドでは街区が通常の米国の半分の、約60m四方とされています。区画を細かくすると、交差点や曲がり角が増えてルートの選択肢が増え、散策がしやすくなります。その結果、人の回遊が生まれて街が活気づく、という考え方です。"],"tags":["ポートランド"],"id":105,"question":"ボートランドはどうやって歩きやすい街を整備したのですか？","keywords":["ボートランド","整備","ポートランド"]},{"answers":["● 本日は合計120分のツアーを予定しています。まずこちらで概要をご説明した後、実際に街を回って体感いただき、最後に質疑のお時間をお取りします。","● 街歩きパートは約70分でマップの①〜⑩を回ります。お手元のパナガイドはチャンネル1にお合わせください。","● スマートフォン上のMentimeterを使い、皆さまの興味や感想を「言語化」しながら進めるのが柏の葉ツアーの特徴です。"],"tags":["ツアー運営"],"id":106,"question":"ツアーの所要時間と進行はどうなっていますか？","keywords":["ツアー","所要時間","進行","ツアー運営"]},{"answers":["● 千葉県柏市の北部に位置し、東京中心部より約25km圏内にあります。","● つくばエクスプレス（TX）で秋葉原から最速30分、常磐自動車道・柏ICからも約5分です。","● 羽田空港・成田空港のいずれにも直通バスがあり、それぞれ44分・57分でアクセス可能です。"],"tags":["立地・アクセス"],"id":107,"question":"柏の葉スマートシティの場所と主要アクセスは？","keywords":["スマートシティ","アクセス","場所","主要","立地・アクセス"]},{"answers":["● もともと幕府直轄の軍馬育成地でした。明治維新後に三井家が土地を直接所有して開墾したことが、現在の三井不動産グループとのつながりです。","● 第二次世界大戦中は「柏飛行場」と呼ばれた飛行場があり、B-29迎撃用の戦闘機「秋水」を配備する予定でしたが、完成前に敗戦となりました。","● 戦後、飛行場跡地は米軍の柏通信所となり、ピンク色の隣接地は三井のゴルフ場として40年間使われました。"],"tags":["歴史"],"id":108,"question":"江戸時代からの柏の葉の歴史を教えてください。","keywords":["江戸時代","歴史"]},{"answers":["● 戦後、飛行場跡地が米軍の柏通信所、隣接地が三井のゴルフ場として使われてきた歴史が背景にあります。","● 1974年に米国から日本へ土地が全面返還され、東京大学・千葉大学・国立がんセンターなど日本のトップアカデミアが集結しました。","● 開発エリアの大半が公有地か三井所有地でまとまっているため、長期視点で街を開発できる国内でも稀有な環境が生まれています。"],"tags":["歴史"],"id":109,"question":"公有地と三井所有地が大半を占めている理由は？","keywords":["公有地","三井所有地","大半","理由","歴史"]},{"answers":["● 2000年に千葉県が事業主体となり、土地区画整理事業が認可されたのが大きな転機です。","● 2005年のつくばエクスプレス開業を契機にゴルフ場を閉鎖し、本格的な街づくりがスタートしました。","● 2000〜2015年を「第一ステージ」、2016〜2030年を「第二ステージ」と位置づけています。"],"tags":["歴史"],"id":110,"question":"土地区画整理事業はいつから始まりましたか？","keywords":["土地区画整理事業","歴史"]},{"answers":["● 第一ステージ（2000-2015年）は、ららぽーと柏の葉などの商業施設や住宅、ホテル、オフィスといった駅前ハード開発が中心でした。","● 第二ステージ（2016-2030年）は「多様なプレイヤーが次々とイノベーションを起こす街」をテーマに、ソフト面とコミュニティ、産学共創拠点の開発が進んでいます。","● 東京大学・千葉大学などのトップアカデミアと企業が共創し、世界が抱える課題の解決モデルを実証・発信することを目指しています。"],"tags":["これからの街づくり"],"id":111,"question":"第一ステージと第二ステージの違いは？","keywords":["ステージ","第一","第二","これからの街づくり"]},{"answers":["● 「環境共生」「健康長寿」「新産業創造」の3つを柱としています。","● ハードとソフトを高度に融合させ、持続可能な「世界の未来像をつくる街」を目指しています。","● いずれも世界が直面する社会課題に対し、街全体を実証フィールドとして解決モデルをつくる狙いがあります。"],"tags":["コンセプト"],"id":112,"question":"柏の葉スマートシティの3つのテーマは何ですか？","keywords":["スマートシティ","テーマ","コンセプト"]},{"answers":["● 2008年に策定された、柏の葉スマートシティの街づくりの指針となる構想です。","● 計画初期から含めると半世紀プロジェクトとなっており、その軸を守る「憲法」のような役割を果たしています。","● 街全体が大学のキャンパスのように、緑豊かで質の高い知的交流の空間となることを目指しています。"],"tags":["コンセプト"],"id":113,"question":"国際キャンパスタウン構想とは何ですか？","keywords":["キャンパスタウン","国際","構想","コンセプト"]},{"answers":["● 柏の葉スマートシティの設計の中心にある「緑の軸線」のことです。","● この軸線に沿って二番街やゲートタワーが配置され、駅から大学・公園へと自然に歩きたくなる動線を確保しました。","● 住宅・オフィス・商業施設を一体化したミクストユースで、住む・働く・学ぶ・遊ぶが徒歩圏内で完結するウォーカブルな暮らしを実現しています。"],"tags":["街づくり"],"id":114,"question":"「グリーンアクシス」とは何ですか？","keywords":["グリーンアクシス","街づくり"]},{"answers":["● 柏の葉のオープンスペース設計の考え方で、マンション敷地を塀で囲わず、居住者でなくても自由に行き来できる空間として設計しています。","● その代わり、セキュリティは各マンションの建物内で万全にする思想です。","● 「監視カメラより、人の目（賑わい）の方が安全」という信念から、塀のない街の景色を実現しています。"],"tags":["街づくり"],"id":115,"question":"「ガーデン・コモン・タウン」の3要素とは？","keywords":["ガーデン","コモン","タウン","要素","街づくり"]},{"answers":["● サブスク型の洗濯代行クリーニング店や、365日・平日夜9時まで開いている小児科クリニックなどライフスタイル支援型のテナントを誘致しています。","● 3階にはテレワークしながらお子さんの保育もできる施設があり、子育ての「あったらいいな」を実現しています。","● ミクストユースを支える独自性あるテナント選定が、街の日常価値を高めています。"],"tags":["ゲートタワー"],"id":116,"question":"ゲートタワー1Fテナントのユニークなラインナップは？","keywords":["ゲートタワー","テナント","ユニーク","ラインナップ"]},{"answers":["● 通常、電気事業法により公道をまたいだ電力融通は電力会社しか行えません。柏の葉では国に特例として認めさせ、自営の送電線を引いてAEMSと電力融通装置で街区間融通を実現しています。","● 東日本大震災後の「安心が必要」という議論が後押しとなり、規制緩和を勝ち取った仕組みです。","● 現在のセンターは単なる機械ではなく「規制緩和の戦利品」とも言える、安心の街の象徴となっています。"],"tags":["エネルギー"],"id":117,"question":"AEMSが街区を越えて電力融通できるのはなぜ？","keywords":["街区","電力融通","AEMS","エネルギー"]},{"answers":["● 通常、太陽光や風力は不安定な発電設備とみなされ、特定供給の発電設備としては認められないケースが多いです。","● 柏の葉では蓄電池との組み合わせと、AEMSによる管理が高く評価されました。","● 結果として、国内で初めて太陽光発電設備が特定供給の発電設備として許可された事例となっています。"],"tags":["エネルギー"],"id":118,"question":"太陽光発電を特定供給設備として認可された経緯は？","keywords":["太陽光発電","特定供給設備","認可","経緯","エネルギー"]},{"answers":["● 平常時は太陽光・風・バイオガス・温泉などから創エネし、AEMSがピークカットや街区間融通を行い、年間1,000万円程度の電力料金を削減しています。","● 非常時は東京電力からの系統電力が遮断された際、ガスタービン発電や蓄電池を使い、周辺集合住宅も含めて3日間・約6割の電力ライフラインを確保します。","● エレベーター、機械駐車場、トイレ、共用照明などの必要最低限の機能が使えるように設計されています。"],"tags":["エネルギー"],"id":119,"question":"平常時と非常時のエネルギー運用の違いは？","keywords":["エネルギー","平常時","非常時","運用"]},{"answers":["● 2014年から稼働している国内最大級のリチウムイオン蓄電池です。","● 蓄電能力は約3,836kWhで、500kW×7.6時間出力できます。","● 規模感としては、トヨタのプリウス約900台分に相当します。"],"tags":["エネルギー"],"id":120,"question":"リチウムイオン蓄電池の規模は？","keywords":["リチウムイオン","蓄電池","規模","エネルギー"]},{"answers":["● 投資対効果（ROI）だけで見ると赤字案件です。導入と維持費が大きく、平常時の利用は限定的だからです。","● それでも導入したのは、SMCのような「絶対に止まれないグローバル企業」を誘致する最強の武器となるからです。停電時も操業できる安心感が街の価値を押し上げます。","● 結果として、街全体を守る「高額な保険証書」として街の付加価値を生み出し、住民にとっても「安心して暮らせる柏の葉」を実現しています。"],"tags":["エネルギー"],"id":121,"question":"NAS電池は採算が合わなくても導入したのですか？","keywords":["電池","採算","導入","NAS","エネルギー"]},{"answers":["● 健康づくりの3つの要素「あるく・しゃべる・たべる」の頭文字から名付けられました。","● 高齢者がケガや病気になる前に陥りやすい「フレイル」予防に重点を置いています。","● ウォーキング体験教室、食と運動のミニ講座など、楽しみながら学べるプログラムも充実しています。"],"tags":["健康長寿"],"id":122,"question":"「あ・し・た」という名前の由来は？","keywords":["名前","由来","健康長寿"]},{"answers":["● 株式会社明治と共同で実施している実証プロジェクトです。","● 朝、柏の葉に集まってストレッチをし、周辺をウォーキングした後にヨーグルトを飲む、という朝活の実証実験です。","● 市民は健康になり、企業は自社製品と運動習慣を掛け合わせた健康データを収集できる、Win-Winの仕組みになっています。"],"tags":["健康長寿"],"id":123,"question":"「ウォーキングルト」とはどのような取り組みですか？","keywords":["ウォーキングルト","健康長寿"]},{"answers":["● デジタルの仕組みだけでなく「アナログな信頼」を得ることを重視しています。","● 「あ・し・た」には有人対応のITコンシェルジュを置き、使い方の説明と世間話を通じて信頼関係を作っています。","● 参画企業がブース出展する理由も、コンシェルジュと親しいアクティブシニアの本音を聞ける場が他にないからです。"],"tags":["健康長寿"],"id":124,"question":"健康データを企業に渡すことへの住民の抵抗はどう乗り越えていますか？","keywords":["データ","健康","企業","住民","抵抗","健康長寿"]},{"answers":["● 大学・病院・民間企業が連携し、街全体を「健康医療の社会実装フィールド」にする試みです。","● ウォーキングルトのように、朝活を通じた健康データ蓄積など、市民生活と先端医療を直接つなぐ取り組みが進んでいます。","● 新しいヘルスケアサービスを街から生み出し、将来の社会保障費削減にも繋げていくことを目指しています。"],"tags":["健康長寿"],"id":125,"question":"ライフサイエンス拠点化構想とは何ですか？","keywords":["ライフサイエンス","拠点化構想","健康長寿"]},{"answers":["● 創業前や創業後の早い段階の起業家を対象に、ビジネスアイデアのブラッシュアップや事業計画策定を伴走支援するプログラムです。","● ビジネスプラン構築セミナー、専門家による個別メンタリングなど、事業初期段階で必要なソフト面の支援を提供しています。","● 柏の葉にある様々なプレイヤーやコミュニティとのつなぎ役を担っている点が、他の街にはない特徴です。"],"tags":["新産業創造"],"id":126,"question":"KOIL STARTUP PROGRAMの支援内容は？","keywords":["支援内容","KOIL","STARTUP","PROGRAM","新産業創造"]},{"answers":["● 単に箱を用意しても、大企業のビジネスパーソンと若手起業家は混ざりません。最初は水と油でした。","● コミュニティマネージャーが「お見合いおばちゃん」のように飲み会を開き、無理やり名刺交換させ、共通言語を作る、という人間臭いお節介で支えています。","● ガラス張りの美しい空間は、実は徹底的な対人マネジメントで成り立っています。"],"tags":["KOIL"],"id":127,"question":"KOILで大企業と起業家を本当に交流させる仕組みは？","keywords":["大企業","起業家","本当","交流","仕組","KOIL"]},{"answers":["● 街全体を活用して、サービスやプロダクトのトライアルから実装まで行える柏の葉ならではの実証フィールドです。","● 近隣には三井リンクラボ、産総研、国立がん研究センター東病院など多様な研究機関・国立病院があります。","● 新たなサービス・プロダクトの社会実装に直結する環境を提供しています。"],"tags":["新産業創造"],"id":128,"question":"イノベーションフィールド柏の葉とは？","keywords":["イノベーションフィールド","新産業創造"]},{"answers":["● 敷地面積約4万2,800㎡、延床面積8万5,000㎡超の大規模施設で全3棟構成です。","● 総投資額は約1,200億円、約1,400名のエンジニアが在籍します。2025年9月竣工、2026年3月本格稼働です。","● 米国・欧州・中国の技術センターと時差を活用した分業体制で、年間約5,000件のカスタムオーダー製品を効率的に開発しています。"],"tags":["SMC"],"id":129,"question":"SMC Japan Technical Center（JTC）の規模は？","keywords":["規模","SMC","Japan","Technical","Center","JTC"]},{"answers":["● 当初は「半公共エリア」として税減免を受けていましたが、優遇を自ら捨てて完全な私有地に転換しました。","● 公共のままだとルールが厳しく「営利活動はダメ」「前例がない」と止められるため、自由な賑わいづくりができませんでした。","● 「税金を払ってでも自由を買う」という決断が、現在のマルシェや音楽フェスなど多彩な賑わいを生んでいます。"],"tags":["街の運営"],"id":130,"question":"駅前広場が「私有地」に転換された理由は？","keywords":["駅前広場","私有地","転換","理由","街の運営"]},{"answers":["● 本来「調整池」は「立入禁止＋金網フェンス」が行政の鉄則ですが、フェンスで囲まれた街には人は住みたいと思わないという考えから、逆転の発想で開放しました。","● 人が集まり常に誰かの目がある「衆人環視」を作るほうが安全だという思想です。","● 管理リスクを民間（三井不動産・UDCKTM）が背負う覚悟があって初めて成立した、日本初の事例です。"],"tags":["環境共生"],"id":131,"question":"アクアテラスはなぜフェンスがないのですか？","keywords":["アクアテラス","フェンス","環境共生"]},{"answers":["● 公共の池なら税金ですが、それでは「最低限の管理」しかできません。","● 地権者を中心とした管理体制で、自分たちのお金で「巨大なろ過装置」を回し定期的に清掃しています。","● 「美しい景色はタダじゃない」という、柏の葉の住民と企業のプライドを体現する施設です。"],"tags":["環境共生"],"id":132,"question":"アクアテラスの水質と維持費はどう確保していますか？","keywords":["アクアテラス","水質","維持費","確保","環境共生"]},{"answers":["● 東京大学の建物の1階を借りて運営されています。","● 主な機能は「国際キャンパスタウン構想に基づいた都市計画の諮問機関」と「公民学連携のハブ機能」の2つです。","● 街のあらゆる情報と計画がここに集約され、今後の開発も中心的な役割を担います。"],"tags":["公民学連携"],"id":133,"question":"UDCKはどこにありますか？建物の場所は？","keywords":["建物","場所","UDCK","公民学連携"]},{"answers":["● 3者は「言語」も「ゴール」も全く違います。行政は公平性と前例、民間はスピードと利益、大学は新しい実験を求めるからです。","● 会議室で議論するだけでは喧嘩で終わるので、毎日顔を合わせる物理的な場（UDCK）を作りました。","● 「面倒な調整をイライラしながらでも解決する関係値」こそがスマートシティの真の司令塔です。"],"tags":["公民学連携"],"id":134,"question":"公民学連携が難しい本当の理由は？","keywords":["公民学連携","本当","理由"]},{"answers":["● 柏の葉の街中に隠れている妖精をモチーフにしたアートです。","● 「日が当たる影もアートに」というコンセプトから名付けられました。","● 未だに何匹いるか誰も知らず、子どもたちが新種を発見してくれることもあります。"],"tags":["アート"],"id":135,"question":"「かげもしゃ」とは何ですか？","keywords":["アート"]},{"answers":["● 「リンゴ」は人間に知恵を授けた木の実と言われています。","● 大学や研究機関が集まる柏の葉キャンパスにふさわしいモニュメントの一つとして、街の各所に配置されています。","● 「かげもしゃ」と並ぶ、街歩きの楽しみのひとつになっています。"],"tags":["アート"],"id":136,"question":"街中のリンゴモニュメントの意味は？","keywords":["リンゴモニュメント","街中","意味","アート"]},{"answers":["● 色違いより、同じ色のコントラストで表現する方が、年齢を重ねた方や色覚障がいを持つ方には見やすいことを考慮しています。","● 色覚障がいは男性20人に1人、女性500人に1人と言われており、より住みやすい社会のための工夫です。","● 街の様々な場所に同様の配慮があるので、皆さまも探してみてください。"],"tags":["街づくり"],"id":137,"question":"看板のユニバーサルデザインの工夫は？","keywords":["ユニバーサルデザイン","看板","工夫","街づくり"]},{"answers":["● 道路の中に送電コイルが埋まっており、原理はスマホの「置くだけ充電」と同じです。","● 信号待ちの1秒で約100m、10秒で1km走れるだけの電気をワイヤレスでバスに送ります。","● 消費効率96%でほぼ有線給電と同等、2030年頃の実用化を目指す柏市・大学・民間の公民学連携プロジェクトです。"],"tags":["モビリティ"],"id":138,"question":"走行中ワイヤレス給電の仕組みは？","keywords":["ワイヤレス","走行中","給電","仕組","モビリティ"]},{"answers":["● 通常のEVバッテリーは1台400kg（体重50kgの人が8人乗っている計算）と非常に重いです。","● 走行中給電なら小さなバッテリーで運用でき、車体が軽くなり、製造時・廃棄時のCO2削減にもつながります。","● 巡回バスなら1kmを継続的に走れれば運用可能で、現実的な選択肢となります。"],"tags":["モビリティ"],"id":139,"question":"走行中給電のメリットは何ですか？","keywords":["メリット","走行中給電","モビリティ"]},{"answers":["● 交差点中央で前方車両の挙動を予測しながら、横断歩道上の歩行者・自転車も同時に判定する必要があります。","● バスは車体が大きく死角も生まれやすいため、小型車両より「巻き込みやすい」固有の課題があります。","● 復路の右折では対向車・前方車・横断歩道の歩行者を同時に判断する必要があり、レベル4実証で技術的に最も難しい場面の一つです。"],"tags":["モビリティ"],"id":140,"question":"自動運転バスの右折はなぜ難しいのですか？","keywords":["バス","自動運転","右折","モビリティ"]},{"answers":["● 駅前や商業エリア、大学付近などリスクが大きい場所はレベル2で運行し、情報収集や技術検証に必要な区間をレベル4にする「段階的な切り替え」で進めています。","● 切替時は停車し、運転モードをレベル2からレベル4へ切り替えます。","● レベル4区間では信号機など路側情報も活用する「協調型」の制御で、急ブレーキを避ける工夫を入れています。"],"tags":["モビリティ"],"id":141,"question":"レベル2区間とレベル4区間はどのように切り替えていますか？","keywords":["レベル","区間","モビリティ"]},{"answers":["● 柏の葉には29台のAIカメラが設置されています。","● 異常状態（うずくまり、危険行動、凶器保持、立入禁止地区への侵入、雨天増水、混雑状況など）を検知しています。","● そのうち4台はアクアテラスに設置され、台風等で浸水を検知すると自動的にサインボードが赤く点灯し、防災センターと連携して入り口を封鎖します。"],"tags":["安全・防災"],"id":142,"question":"AIカメラは何台設置されていますか？","keywords":["カメラ","何台設置","AI","安全・防災"]},{"answers":["● 日本に200ヶ所以上ある植物工場の中でも有数の規模です。","● 水使用量が自然栽培の1/50で済むのが特徴で、柏の葉スマートシティ内の飲食店でも野菜が提供されています。","● 研究会は会員団体130社・個人100名が参画、職員20人のうち2割が海外企業出身です。"],"tags":["新産業創造"],"id":143,"question":"千葉大の植物工場の特徴は？","keywords":["千葉大","植物工場","特徴","新産業創造"]},{"answers":["● 土地所有は千葉大学（公有地）で、三井不動産がリーシングを担当しました。","● 不動産事業として直接収益にはなりませんが、「街づくりにおける高度人材の定着」という柏の葉の目的に沿うため推進されました。","● 国立大学キャンパス内に英国私立学校を建てる前例のない取り組みで、文科省・大学・民間・海外学校の調整が必要でした。"],"tags":["ラグビー校"],"id":144,"question":"ラグビースクールジャパンの土地所有はどこですか？","keywords":["ラグビースクールジャパン","土地所有","ラグビー校"]},{"answers":["● 43階建てで、柏市内では1位、千葉県内で2位の高さです。","● 最も安い1LDKで5,000万円、多くは70〜80㎡で9,000万円〜1.2億円です。","● 最上階は約2.2億円となります。"],"tags":["住宅"],"id":145,"question":"新しいタワーマンションの規模と価格は？","keywords":["タワーマンション","規模","価格","住宅"]},{"answers":["● 住民の同 ことで、生活者目線のサービス・製品開発につなげています。"],"tags":["健康長寿"],"id":153,"question":"花王と実施した産前産後のワークショップとは？","keywords":["ワークショップ","花王","実施","産前産後","健康長寿"]},{"answers":["● ポートランドは「全米で最も住みたい街」と評価され、住む・働く・遊ぶ・学ぶがコンパクトに徒歩圏に集積した「ミクストユース」の街づくりを実現しているからです。","● 公共・商業施設に20分以内にたどり着けることをコンセプトに、自転車道路整備や歩きやすい街割りなどソフトとハードの両面から都市設計を行っています。","● シニアの歩行時間が長くなると医療費抑制につながるという研究もあり、ウォーカブルな街づくりの参考にしています。"],"tags":["街づくり"],"id":154,"question":"なぜポートランドを参考にしているのですか？","keywords":["ポートランド","参考","街づくり"]}];

  /* ---- Constants ---- */
  const APP_VERSION = '1.0';
  const SALT = 'kashinoha-2026-tour-guide';
  const DEFAULT_PASSWORD = '2026';
  const STORAGE_KEYS = {
    pwHash: 'kfaq.pwHash',
    failCount: 'kfaq.failCount',
    lockUntil: 'kfaq.lockUntil'
  };
  const MAX_FAILS = 3;
  const LOCKOUT_MS = 30 * 1000;
  const PAGE_SIZE = 4;

  /* ---- Hash (simple Base64 + salt) ---- */
  function hashPassword(pw) {
    const raw = SALT + '::' + pw + '::' + SALT;
    // Convert UTF-8 -> Base64
    const b64 = btoa(unescape(encodeURIComponent(raw)));
    // light obfuscation: reverse + chunk
    return b64.split('').reverse().join('');
  }

  function getStoredHash() {
    let h = localStorage.getItem(STORAGE_KEYS.pwHash);
    if (!h) {
      h = hashPassword(DEFAULT_PASSWORD);
      localStorage.setItem(STORAGE_KEYS.pwHash, h);
    }
    return h;
  }

  /* ---- Text normalization for search ---- */
  function toHalfWidth(str) {
    return str.replace(/[！-～]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0))
              .replace(/　/g, ' ');
  }
  function katakanaToHiragana(str) {
    return str.replace(/[ァ-ヶ]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
  }
  function normalize(str) {
    if (!str) return '';
    let s = String(str);
    s = toHalfWidth(s);
    s = s.toLowerCase();
    s = katakanaToHiragana(s);
    s = s.replace(/\s+/g, '');
    return s;
  }

  /* ---- Scoring search ---- */
  function tokenize(q) {
    const norm = normalize(q);
    if (!norm) return [];
    // split on Japanese particles and punctuation, keep meaningful chunks
    const parts = norm.split(/[\s、。,.\/\\?？!！「」（）()\[\]\-_=+*&%$#@~"'｜\|・]+/).filter(Boolean);
    // Also include the whole normalized query
    const set = new Set(parts);
    set.add(norm);
    return [...set].filter(t => t.length >= 1);
  }

  function score(rec, tokens, rawNorm) {
    if (!tokens.length) return 0;
    let s = 0;
    const qNorm = normalize(rec.question);
    const tagNorm = (rec.tags || []).map(normalize);
    const kwNorm = (rec.keywords || []).map(normalize);
    const aNorm = (rec.answers || []).map(normalize);

    for (const t of tokens) {
      if (!t) continue;
      // Exact match against any keyword
      if (kwNorm.some(k => k === t)) s += 10;
      // Partial match against keyword
      else if (kwNorm.some(k => k && k.indexOf(t) >= 0)) s += 6;
      // Partial in question
      if (qNorm.indexOf(t) >= 0) s += 5;
      // Tag match (partial)
      if (tagNorm.some(tg => tg && tg.indexOf(t) >= 0)) s += 3;
      // Answer partial
      if (aNorm.some(a => a && a.indexOf(t) >= 0)) s += 1;
    }
    // Whole-query boost
    if (rawNorm && qNorm.indexOf(rawNorm) >= 0) s += 4;
    return s;
  }

  function search(query) {
    const tokens = tokenize(query);
    const rawNorm = normalize(query);
    const scored = FAQ_DB.map(rec => ({ rec, s: score(rec, tokens, rawNorm) }))
                         .filter(o => o.s > 0)
                         .sort((a, b) => b.s - a.s || a.rec.id - b.rec.id);
    return scored.map(o => o.rec);
  }

  /* ---- DOM helpers ---- */
  const $ = sel => document.querySelector(sel);
  const $$ = sel => document.querySelectorAll(sel);

  function show(screenId) {
    $$('.screen').forEach(el => el.classList.remove('active'));
    $('#' + screenId).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
  }

  function openModal(id) { $('#' + id).classList.add('active'); }
  function closeModal(id) { $('#' + id).classList.remove('active'); }

  /* ---- Login flow ---- */
  function loginAttempt(e) {
    e && e.preventDefault();
    const input = $('#pwInput');
    const err = $('#loginError');
    err.textContent = '';

    const lockUntil = parseInt(localStorage.getItem(STORAGE_KEYS.lockUntil) || '0', 10);
    if (lockUntil && Date.now() < lockUntil) {
      const sec = Math.ceil((lockUntil - Date.now()) / 1000);
      err.textContent = `ロックアウト中です。あと ${sec} 秒お待ちください。`;
      return;
    }

    const val = input.value || '';
    if (!val) { err.textContent = 'パスワードを入力してください。'; return; }

    const ok = hashPassword(val) === getStoredHash();
    if (ok) {
      localStorage.removeItem(STORAGE_KEYS.failCount);
      localStorage.removeItem(STORAGE_KEYS.lockUntil);
      input.value = '';
      show('search');
      setTimeout(() => $('#kwInput').focus(), 50);
    } else {
      let fails = parseInt(localStorage.getItem(STORAGE_KEYS.failCount) || '0', 10) + 1;
      localStorage.setItem(STORAGE_KEYS.failCount, String(fails));
      if (fails >= MAX_FAILS) {
        const until = Date.now() + LOCKOUT_MS;
        localStorage.setItem(STORAGE_KEYS.lockUntil, String(until));
        localStorage.setItem(STORAGE_KEYS.failCount, '0');
        err.textContent = `${MAX_FAILS}回連続で失敗しました。30秒間ロックアウトされます。`;
        startLockoutCountdown(until);
      } else {
        err.textContent = `パスワードが違います（${fails}/${MAX_FAILS}）。`;
      }
      input.select();
    }
  }
  function startLockoutCountdown(until) {
    const err = $('#loginError');
    const tick = () => {
      const remain = until - Date.now();
      if (remain <= 0) { err.textContent = ''; return; }
      err.textContent = `ロックアウト中です。あと ${Math.ceil(remain/1000)} 秒お待ちください。`;
      setTimeout(tick, 500);
    };
    tick();
  }

  /* ---- Search flow ---- */
  let lastResults = [];
  let lastQuery = '';
  let pageIndex = 0;

  function runSearch(e) {
    e && e.preventDefault();
    const q = ($('#kwInput').value || '').trim();
    if (!q) {
      $('#kwInput').focus();
      return;
    }
    lastQuery = q;
    lastResults = search(q);
    pageIndex = 0;
    renderResults();
    show('results');
  }

  function renderResults() {
    $('#resKw').textContent = lastQuery;
    const total = lastResults.length;
    const start = pageIndex * PAGE_SIZE;
    const end = Math.min(start + PAGE_SIZE, total);
    if (total === 0) {
      $('#resCount').textContent = '';
      $('#cardList').innerHTML = '';
      $('#moreRow').style.display = 'none';
      $('#cardList').insertAdjacentHTML('beforeend',
        `<div class="empty"><div class="big">該当する質問が見つかりませんでした</div><div>キーワードを変えてもう一度お試しください。</div></div>`);
      return;
    }
    $('#resCount').textContent = `候補 ${total} 件中 ${start + 1}〜${end} 件目を表示`;
    const cards = lastResults.slice(start, end).map((rec, i) => cardHTML(rec, i)).join('');
    $('#cardList').innerHTML = cards;
    $('#moreRow').style.display = end < total ? 'flex' : 'none';
    $('#moreBtn').disabled = end >= total;
    bindCardEvents();
  }

  function escapeHTML(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function cardHTML(rec, idx) {
    const tag = (rec.tags && rec.tags[0]) ? escapeHTML(rec.tags[0]) : '';
    const ans = (rec.answers || []).slice(0, 3).map(a => {
      // strip leading "●" if present, render with styled bullet
      const cleaned = String(a).replace(/^[●⚫・･\s]+/, '');
      return `<p class="answer"><span class="bullet">●</span>${escapeHTML(cleaned)}</p>`;
    }).join('');
    return `
      <div class="card color-${idx % 4}" data-id="${rec.id}">
        <div class="card-head" role="button" tabindex="0" aria-expanded="false">
          <div>
            <div class="card-title">${escapeHTML(rec.question)}</div>
            ${tag ? `<div class="card-cat">${tag}</div>` : ''}
          </div>
          <div style="flex:1"></div>
          <div class="toggle-icon">▾</div>
        </div>
        <div class="card-body">
          <div class="card-body-inner">${ans || '<p class="answer">回答情報が登録されていません。</p>'}</div>
        </div>
      </div>`;
  }

  function bindCardEvents() {
    $$('#cardList .card').forEach(card => {
      const head = card.querySelector('.card-head');
      const toggle = () => {
        const willOpen = !card.classList.contains('open');
        // Close all then open self
        $$('#cardList .card.open').forEach(c => {
          c.classList.remove('open');
          c.querySelector('.card-head').setAttribute('aria-expanded', 'false');
        });
        if (willOpen) {
          card.classList.add('open');
          head.setAttribute('aria-expanded', 'true');
        }
      };
      head.addEventListener('click', toggle);
      head.addEventListener('keydown', ev => {
        if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); toggle(); }
      });
    });
  }

  // Click outside an open card closes it
  document.addEventListener('click', (e) => {
    const openCards = $$('#cardList .card.open');
    if (!openCards.length) return;
    const inside = e.target.closest('.card.open');
    if (!inside) {
      openCards.forEach(c => {
        c.classList.remove('open');
        const h = c.querySelector('.card-head');
        if (h) h.setAttribute('aria-expanded', 'false');
      });
    }
  });

  /* ---- "More" button: next page ---- */
  function showMore() {
    const total = lastResults.length;
    const next = (pageIndex + 1) * PAGE_SIZE;
    if (next < total) pageIndex += 1;
    else pageIndex = 0; // loop back
    renderResults();
    // Scroll to results top
    $('#resultsContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  /* ---- Voice input (Web Speech API) ---- */
  function setupVoice() {
    const mic = $('#micBtn');
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      mic.classList.add('unsupported');
      mic.title = 'このブラウザは音声入力に対応していません';
      mic.addEventListener('click', () => {
        alert('このブラウザは音声入力に対応していません。Chrome、Safari、Edgeをご利用ください。');
      });
      return;
    }
    let rec = null;
    let listening = false;

    const stop = () => {
      if (rec) { try { rec.stop(); } catch (_) {} }
      mic.classList.remove('listening');
      listening = false;
    };
    const start = () => {
      rec = new SR();
      rec.lang = 'ja-JP';
      rec.interimResults = true;
      rec.continuous = false;
      rec.onresult = (ev) => {
        let txt = '';
        for (let i = ev.resultIndex; i < ev.results.length; i++) {
          txt += ev.results[i][0].transcript;
        }
        $('#kwInput').value = txt;
      };
      rec.onerror = () => stop();
      rec.onend = () => stop();
      try { rec.start(); mic.classList.add('listening'); listening = true; }
      catch (_) { stop(); }
    };

    mic.addEventListener('click', () => {
      if (listening) stop(); else start();
    });
  }

  /* ---- Exit flow ---- */
  function bindExit() {
    const open = () => openModal('exitModal');
    $('#exitBtn1').addEventListener('click', open);
    $('#exitBtn2').addEventListener('click', open);
    $('#exitConfirmBtn').addEventListener('click', () => {
      // close tab if possible, else go back to login + clear input
      try { window.close(); } catch (_) {}
      // fallback: navigate to about:blank-ish reset
      setTimeout(() => {
        closeModal('exitModal');
        $('#kwInput').value = '';
        show('login');
        $('#pwInput').value = '';
      }, 100);
    });
  }
  function bindModals() {
    document.querySelectorAll('[data-modal-close]').forEach(b => {
      b.addEventListener('click', () => {
        const m = b.closest('.modal-backdrop');
        if (m) m.classList.remove('active');
      });
    });
    // backdrop click closes
    $$('.modal-backdrop').forEach(m => {
      m.addEventListener('click', (e) => {
        if (e.target === m) m.classList.remove('active');
      });
    });
  }

  /* ---- Admin (password change) ---- */
  function bindAdmin() {
    let pressTimer = null;
    let pressed = false;
    const title = $('#brandTitle');

    const startPress = () => {
      pressed = true;
      pressTimer = setTimeout(() => {
        if (pressed) openAdmin();
      }, 5000);
    };
    const cancelPress = () => {
      pressed = false;
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    };
    title.addEventListener('mousedown', startPress);
    title.addEventListener('touchstart', startPress, { passive: true });
    ['mouseup','mouseleave','touchend','touchcancel'].forEach(ev =>
      title.addEventListener(ev, cancelPress));

    // Also expose via menu button on search screen
    $('#menuBtn').addEventListener('click', openAdmin);

    function openAdmin() {
      $('#curPw').value = '';
      $('#newPw').value = '';
      $('#confPw').value = '';
      $('#adminMsg').textContent = '';
      openModal('adminModal');
      setTimeout(() => $('#curPw').focus(), 50);
    }

    $('#changePwBtn').addEventListener('click', () => {
      const cur = $('#curPw').value || '';
      const nw = $('#newPw').value || '';
      const conf = $('#confPw').value || '';
      const msg = $('#adminMsg');
      msg.textContent = '';

      if (hashPassword(cur) !== getStoredHash()) {
        msg.textContent = '現パスワードが違います。'; return;
      }
      if (nw.length < 4) {
        msg.textContent = '新パスワードは4文字以上で入力してください。'; return;
      }
      if (nw !== conf) {
        msg.textContent = '新パスワード（確認）が一致しません。'; return;
      }
      localStorage.setItem(STORAGE_KEYS.pwHash, hashPassword(nw));
      msg.style.color = 'var(--green)';
      msg.textContent = 'パスワードを変更しました。';
      setTimeout(() => {
        msg.style.color = '';
        closeModal('adminModal');
      }, 1200);
    });
  }

  /* ---- Wire up ---- */
  function init() {
    // Ensure default password hash is set
    getStoredHash();
    // Restore lockout countdown if still active
    const until = parseInt(localStorage.getItem(STORAGE_KEYS.lockUntil) || '0', 10);
    if (until && Date.now() < until) startLockoutCountdown(until);

    $('#loginForm').addEventListener('submit', loginAttempt);
    $('#searchForm').addEventListener('submit', runSearch);
    $('#backBtn').addEventListener('click', () => { show('search'); setTimeout(() => $('#kwInput').focus(), 50); });
    $('#moreBtn').addEventListener('click', showMore);
    setupVoice();
    bindExit();
    bindModals();
    bindAdmin();

    // Focus password
    setTimeout(() => $('#pwInput').focus(), 50);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    // Script is at end of body — DOMContentLoaded may have already fired
    init();
  }
})();
</script>
</body>
</html>
